name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build & Test (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build & Test
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme TabPagerX \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipPackagePluginValidation
